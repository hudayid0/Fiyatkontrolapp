name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run test suite
        run: npm test

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release-key.jks

      # TEMPORARY diagnostic build - bisection already proved minifyEnabled
      # is the trigger (crashes on launch iff true); this builds the SAME
      # commit unminified (-PforceNoMinify=true) purely so the next step can
      # diff the two variants' packaged AndroidManifest.xml against each
      # other from the exact same source, no separate commit needed.
      - name: Build unminified release APK (manifest-diff reference only)
        env:
          KEYSTORE_PATH: release-key.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease -PforceNoMinify=true
          mkdir -p /tmp/manifest-diff
          cp app/build/outputs/apk/release/app-release.apk /tmp/manifest-diff/app-release-nominify.apk
          ./gradlew clean

      - name: Build release AAB
        env:
          KEYSTORE_PATH: release-key.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Build release APK
        env:
          KEYSTORE_PATH: release-key.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease

      # TEMPORARY diagnostic step - diff the packaged (resolved, binary-XML)
      # AndroidManifest.xml between the unminified reference build (above)
      # and this normal minified one, using aapt2 (ships with the Android
      # SDK build-tools already present on GitHub-hosted runners).
      - name: Diff packaged AndroidManifest.xml (minify vs no-minify)
        run: |
          SDK_DIR="${ANDROID_HOME:-$ANDROID_SDK_ROOT}"
          AAPT2=$(find "$SDK_DIR/build-tools" -name aapt2 -type f 2>/dev/null | sort -V | tail -1)
          if [ -z "$AAPT2" ]; then
            AAPT2=$(find / -name aapt2 -type f 2>/dev/null | head -1)
          fi
          echo "Using aapt2: $AAPT2"
          if [ -z "$AAPT2" ]; then
            echo "aapt2 not found anywhere - skipping manifest diff"
            exit 0
          fi
          "$AAPT2" dump xmltree /tmp/manifest-diff/app-release-nominify.apk --file AndroidManifest.xml > /tmp/manifest-diff/nominify.txt
          "$AAPT2" dump xmltree android/app/build/outputs/apk/release/app-release.apk --file AndroidManifest.xml > /tmp/manifest-diff/minify.txt
          echo "--- diff (nominify vs minify) ---"
          diff -u /tmp/manifest-diff/nominify.txt /tmp/manifest-diff/minify.txt || true
          echo "--- end diff ---"
          echo "--- badging diff (aapt2 dump badging) for good measure ---"
          "$AAPT2" dump badging /tmp/manifest-diff/app-release-nominify.apk > /tmp/manifest-diff/nominify-badging.txt
          "$AAPT2" dump badging android/app/build/outputs/apk/release/app-release.apk > /tmp/manifest-diff/minify-badging.txt
          diff -u /tmp/manifest-diff/nominify-badging.txt /tmp/manifest-diff/minify-badging.txt || true
          echo "--- end badging diff ---"

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
