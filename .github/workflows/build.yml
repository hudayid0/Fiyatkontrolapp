name: Android Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run test suite
        run: npm test

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build debug APK
        run: |
          cd android
          ./gradlew assembleDebug

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > android/app/release-key.jks

      - name: Build release AAB
        env:
          KEYSTORE_PATH: release-key.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew bundleRelease

      - name: Upload release AAB
        uses: actions/upload-artifact@v4
        with:
          name: app-release-aab
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Build release APK
        env:
          KEYSTORE_PATH: release-key.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          cd android
          ./gradlew assembleRelease

      # TEMPORARY diagnostic step - bisection (minifyEnabled=false vs true)
      # confirmed R8 causes the release-only startup crash, and a class-level
      # mapping.txt check found every plugin/Bridge/Firebase class intact.
      # Capacitor invokes @PluginMethod-annotated methods via reflection by
      # name (Bridge.java's PluginHandle looks them up from the JS bridge
      # call), so if a *member* got renamed or stripped despite its class
      # surviving, that reflection lookup fails at call time - this checks
      # member-level survival, not just class-level.
      - name: Diagnose ProGuard mapping.txt for @PluginMethod survival
        run: |
          python3 - <<'PYEOF'
          MAP = "android/app/build/outputs/mapping/release/mapping.txt"

          targets = {
              "io.ionic.backgroundrunner.plugin.BackgroundRunnerPlugin": [
                  "checkPermissions", "requestPermissions", "dispatchEvent",
                  "registerBackgroundTask", "removeNotificationListeners",
              ],
              "com.getcapacitor.community.admob.AdMob": [
                  "initialize", "showBanner", "showInterstitial", "requestConsentInfo",
              ],
              "io.capawesome.capacitorjs.plugins.firebase.analytics.FirebaseAnalyticsPlugin": [
                  "logEvent", "setUserId", "setEnabled",
              ],
              "io.capawesome.capacitorjs.plugins.firebase.crashlytics.FirebaseCrashlyticsPlugin": [
                  "recordException", "log", "setEnabled",
              ],
              "com.capacitorjs.plugins.app.AppPlugin": [
                  "getInfo", "getLaunchUrl", "exitApp",
              ],
              "com.capacitorjs.plugins.localnotifications.LocalNotificationsPlugin": [
                  "schedule", "cancel", "checkPermissions", "requestPermissions",
              ],
              "com.capacitorjs.plugins.statusbar.StatusBarPlugin": [
                  "setStyle", "setBackgroundColor", "getInfo",
              ],
              "com.capacitorjs.plugins.filesystem.FilesystemPlugin": [
                  "readFile", "writeFile", "checkPermissions", "requestPermissions",
              ],
              "com.capacitorjs.plugins.share.SharePlugin": [
                  "share", "canShare",
              ],
          }

          try:
              with open(MAP) as f:
                  lines = f.readlines()
          except FileNotFoundError:
              print(f"mapping.txt NOT FOUND at {MAP}")
              raise SystemExit(0)

          print(f"mapping.txt found: {len(lines)} lines")

          blocks = {}
          current = None
          for line in lines:
              if line and not line[0].isspace() and " -> " in line and line.rstrip().endswith(":"):
                  current = line.split(" -> ")[0].strip()
                  blocks[current] = []
              elif current is not None and (line.startswith("    ") or line.startswith("\t")):
                  blocks[current].append(line.strip())

          print("--- checking @PluginMethod survival (member name, not just class) ---")
          for cls, methods in targets.items():
              if cls not in blocks:
                  print(f"CLASS MISSING ENTIRELY: {cls}")
                  continue
              block = blocks[cls]
              for m in methods:
                  matches = [l for l in block if f" {m}(" in l.split(" -> ")[0]]
                  if not matches:
                      print(f"METHOD MISSING: {cls}#{m}")
                      continue
                  renamed_to = [l.split(" -> ")[1].strip() for l in matches if l.split(" -> ")[1].strip() != m]
                  if renamed_to:
                      print(f"RENAMED: {cls}#{m} -> {renamed_to}")
                  else:
                      print(f"OK: {cls}#{m}")
          PYEOF

      - name: Upload release APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: android/app/build/outputs/apk/release/app-release.apk
